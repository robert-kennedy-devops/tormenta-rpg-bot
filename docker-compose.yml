version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tormenta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tormenta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tormenta123}
      POSTGRES_DB: ${POSTGRES_DB:-tormenta_rpg}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: tormenta_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DATABASE_URL: postgres://${POSTGRES_USER:-tormenta}:${POSTGRES_PASSWORD:-tormenta123}@postgres:5432/${POSTGRES_DB:-tormenta_rpg}?sslmode=disable
      ASSETS_DIR: /app/assets/images
      # AbacatePay
      ABACATEPAY_TOKEN: ${ABACATEPAY_TOKEN}
      MP_WEBHOOK_PORT: ${MP_WEBHOOK_PORT:-8080}
      PIX_MANUAL_CONFIRM: ${PIX_MANUAL_CONFIRM:-false}
      # GM
      GM_IDS: ${GM_IDS}
      GM_LOG_CHAT: ${GM_LOG_CHAT:-}
    ports:
      - "8080:8080"
    volumes:
      - bot_assets:/app/assets/images

volumes:
  postgres_data:
  bot_assets:
